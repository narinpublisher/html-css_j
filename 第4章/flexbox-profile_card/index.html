<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox : Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- h1 タグの直前に追加する -->
  <nav class="main-nav">
    <ul class="nav-list">
      <li><a href="#">ホーム</a></li>
      <li><a href="#">プロフィール</a></li>
      <li><a href="#">作品集</a></li>
      <li><a href="#">お問い合わせ</a></li>
    </ul>
  </nav>

  <h1>わたしのプロフィールページ</h1>

  <!-- プロフィールカード全体を囲むコンテナ -->
  <div class="profile-card">

    <!-- 左側：プロフィール写真エリア -->
    <div class="profile-photo">
      <img src="photo.jpg" alt="プロフィール写真">
    </div>

    <!-- 右側：テキスト情報エリア -->
    <div class="profile-info">
      <h2>田中 みなみ</h2>
      <p class="tagline">Web制作をゼロから学習中の22歳です</p>
      <ul class="skill-list">
        <li>HTML / CSS（学習中）</li>
        <li>読書・料理が趣味</li>
        <li>東京都在住</li>
      </ul>
    </div>

  </div>

</body>
</html>
